<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vashon Ferry Schedule</title>
    <!-- Add Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Cardo:ital,wght@0,400;0,700;1,400&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #FFB5B5;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.3'/%3E%3C/svg%3E");
            color: #4B6EDB;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
            height:200px;
        }

        .ferry-illustration {
            position: absolute;
            left: 0;
            right: 0;
            top: -20px;
            width: 100%;
            height: auto;
            z-index: 0;
            pointer-events: none;
        }

        header h1,
        header .update-time {
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        h1 {
               font-family: "Playfair Display", serif;
  font-optical-sizing: auto;
  font-weight: 500;
  font-style: italic;
            font-size: 7em;
            margin-bottom:10px;
   
        }

        .update-time {
            font-family: "Space Mono", monospace;
            font-weight: 400;
            font-style: normal;
            font-size: 0.9em;
            opacity: 0.8;
            color: #000;
            padding: 8px 12px;
            background: #6B8FD9;
            border-radius: 8px;
            width:30%;
            margin: 75px 0 0 0;
            display: inline-block;
            float:left;
        }

        .weather-box {
            font-family: "Space Mono", monospace;
            font-weight: 400;
            font-style: normal;
            font-size: 0.9em;
            opacity: 0.8;
            color: #000;
            padding: 8px 12px;
            background: #FFE66D;
            border-radius: 8px;
            width: 30%;
            margin: 45px 0 0 0;
            display: inline-block;
            float: right;
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .weather-item {
            margin: 4px 0;
        }

        .weather-label {
            font-weight: 700;
        }

        .routes-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 20px;
        }

        .route-section {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .route-title {
             font-family: "Playfair Display", serif;
            font-optical-sizing: auto;
            font-weight: 200;
            font-style: italic;
            margin-bottom: 20px;
            text-align: center;
            color: #4B6EDB;
            font-size: 40px;
        }

        .boat-status {
            text-align: center;
            font-family: "Space Mono", monospace;
            font-size: 0.85em;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            color: #4B6EDB;
        }

        .boat-count {
            font-weight: bold;
            font-size: 1.1em;
        }

        .flag-icon {
            width: 20px;
            height: 20px;
            vertical-align: middle;
            margin-right: 6px;
        }

        .boat-status.two-boat {
            border-top: 4px solid #FF6B6B;
        }

        .boat-status.three-boat {
            border-top: 4px solid #6B8FD9;
        }

        .direction-section {
            margin-bottom: 25px;
        }

        .direction-section:last-child {
            margin-bottom: 0;
        }

        .direction-header {
              font-family: "Space Mono", monospace;
                font-weight: 400;
            font-style: italic;
            font-size: 1em;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: #6B8FD9;
            border-radius: 8px;
            color: #FFFFFF;
            text-align: center;
        }

        .direction-arrow {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .sailings {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sailing {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }

        .sailing:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.25);
        }

        .sailing-time {
              font-family: "Space Grotesk", sans-serif;
  font-optical-sizing: auto;
  font-weight: 200;
  font-style: normal;
            font-size: 1.8em;
            font-weight: bold;
            color: #4B6EDB;
        }

        .sailing-vessel {
            font-family: "Space Mono", monospace;
  font-weight: 400;
  font-style: normal;
            font-size: 0.9em;
            opacity: 0.9;
            color: #FF6B6B;
        }

        .loading {
            text-align: center;
            font-size: 1.5em;
            padding: 50px;
            opacity: 0.7;
        }

        .error {
            background: rgba(255, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .no-sailings {
            text-align: center;
            padding: 20px;
            opacity: 0.7;
            font-style: italic;
        }


        /* Night mode text adjustments */
        body.night-mode .route-title {
            color: #FFFFFF;
        }

        body.night-mode .sailing-vessel {
            color: #FFE66D;
        }

        body.night-mode .sailing-time {
            color: #FFFFFF;
        }

        body.night-mode .direction-header {
            background: #3D5AA6;
        }
        
         body.night-mode .boat-status.three-boat {
            color: #FFFFFF;
        }
        
        body.night-mode .boat-status.two-boat {
            color: #FFFFFF;
        }

        @media (max-width: 768px) {
            .routes-container {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 3em;
            }

            .route-title {
                font-size: 1.5em;
            }

            .sailing-time {
                font-size: 1.5em;
            }

            .ferry-illustration {
                top: -10px;
            }

            .update-time {
                width: 45%;
                margin: 65px 5px 0 5px;
            }
            .weather-box {
                width: 45%;
                font-size: 0.75em;
                margin: 40px 5px 0 5px;
            }

            header {
                height: 180px;
            }
        }

        /* Animation for loading */
        @keyframes pulse {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        .loading {
            animation: pulse 2s infinite;
        }
    </style>
</head>

function determineHeaderType(weatherData) {
    const current = weatherData.current;
    const isDay = current.is_day === 1;
    const weatherCode = current.weather_code;
    const windSpeed = current.wind_speed_10m; // in mph
    
    // Night time overrides all weather
    if (!isDay) {
        return 'night';
    }
    
    // Fog (45, 48)
    if (weatherCode === 45 || weatherCode === 48) {
        return 'fog';
    }
    
    // Snow (71-77, 85-86)
    if ((weatherCode >= 71 && weatherCode <= 77) || 
        weatherCode === 85 || weatherCode === 86) {
        return 'snow';
    }
    
    // Rain/Drizzle (51-67, 80-82, 95-99)
    if ((weatherCode >= 51 && weatherCode <= 67) ||
        (weatherCode >= 80 && weatherCode <= 82) ||
        (weatherCode >= 95 && weatherCode <= 99)) {
        return 'rain';
    }
    
    // Windy (wind speed > 20 mph / ~17 knots)
    if (windSpeed > 20) {
        return 'windy';
    }
    
    // Overcast (3)
    if (weatherCode === 3) {
        return 'overcast';
    }

    // Partly Cloudy (2)
    if (weatherCode === 2) {
        return 'cloudy';
    }
    
    // Clear (0, 1)
    return 'clear';
}

function updateHeaderForWeather(weatherData) {
    const headerType = determineHeaderType(weatherData);
    const headerData = headerSVGs[headerType];
    
    if (!headerData) {
        console.error('No header data for type:', headerType);
        return;
    }
    
    // Update background color with smooth transition
    document.body.style.background = headerData.background;
    document.body.style.backgroundImage = 
        `url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.3'/%3E%3C/svg%3E")`;
    
    // Add/remove night-mode class for text color adjustments
    if (headerType === 'night') {
        document.body.classList.add('night-mode');
    } else {
        document.body.classList.remove('night-mode');
    }
    
    // Inject/update animation CSS for this header type
    let headerStyle = document.getElementById('header-animations');
    if (!headerStyle) {
        headerStyle = document.createElement('style');
        headerStyle.id = 'header-animations';
        document.head.appendChild(headerStyle);
    }
    headerStyle.textContent = headerData.css || '';

    // Update header SVG - use innerHTML to preserve class and attributes
    const ferryIllustration = document.querySelector('.ferry-illustration');
    if (ferryIllustration && headerData.svg) {
        // Extract just the inner content of the SVG (everything between <svg> and </svg>)
        const svgMatch = headerData.svg.match(/<svg[^>]*>(.*?)<\/svg>/s);
        if (svgMatch && svgMatch[1]) {
            ferryIllustration.innerHTML = svgMatch[1];
        }
    }

    console.log(`Header updated to: ${headerType}`);
}

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('en-US', { 
                hour: 'numeric', 
                minute: '2-digit',
                hour12: true 
            });
        }

        function createSailingElement(sailing) {
            if (!sailing || !sailing.departure_time) {
                return '';
            }

            return `
                <div class="sailing">
                    <div class="sailing-time">${sailing.departure_time}</div>
                    <div class="sailing-vessel">${sailing.vessel || 'Ferry'}</div>
                </div>
            `;
        }

        function createDirectionSection(title, sailings) {
            const sailingsHtml = sailings && sailings.length > 0
                ? sailings.map(createSailingElement).join('')
                : '<div class="no-sailings">No upcoming sailings</div>';

            return `
                <div class="direction-section">
                    <div class="direction-header">${title}</div>
                    <div class="sailings">
                        ${sailingsHtml}
                    </div>
                </div>
            `;
        }

        function createBoatStatusHtml(boatAnalysis) {
            if (!boatAnalysis || !boatAnalysis.boat_count) {
                return '';
            }

            const count = boatAnalysis.boat_count;
            const vessels = boatAnalysis.unique_vessels || [];
            const interval = boatAnalysis.avg_interval_minutes;
            const statusClass = count === 2 ? 'two-boat' : 'three-boat';

            // Flag SVG icons
            const redFlag = `<svg class="flag-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 21V4" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
                <path d="M4 4C4 4 5 3 8 3C11 3 13 5 16 5C19 5 20 4 20 4V14C20 14 19 15 16 15C13 15 11 13 8 13C5 13 4 14 4 14" fill="#FF6B6B"/>
            </svg>`;

            const greenFlag = `<svg class="flag-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 21V4" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
                <path d="M4 4C4 4 5 3 8 3C11 3 13 5 16 5C19 5 20 4 20 4V14C20 14 19 15 16 15C13 15 11 13 8 13C5 13 4 14 4 14" fill="#4CAF50"/>
            </svg>`;

            const flagIcon = count === 2 ? redFlag : greenFlag;

            let statusText = `${flagIcon}<span class="boat-count">${count}-Boat Service</span>`;
            if (vessels.length > 0) {
                statusText += ` • ${vessels.join(', ')}`;
            }
            if (interval) {
                statusText += ` • ~${interval} min intervals`;
            }

            return `<div class="boat-status ${statusClass}">${statusText}</div>`;
        }

        function renderFerryData(data) {
            const updateTime = document.getElementById('updateTime');
            const content = document.getElementById('content');

            // Update timestamp
            updateTime.textContent = `Updated: ${formatTime(data.timestamp)}`;

            // Build the display
            const routes = data.routes;
            
            const html = `
                <div class="routes-container">
                    <div class="route-section">
                        <div class="route-title">The North End</div>
                        ${createDirectionSection(
                            'From Vashon to Fauntleroy',
                            routes.vashon_fauntleroy.from_vashon.sailings
                        )}
                        ${createDirectionSection(
                            'From Fauntleroy to Vashon',
                            routes.vashon_fauntleroy.from_fauntleroy.sailings
                        )}
                    </div>

                    <div class="route-section">
                        <div class="route-title">The South End</div>
                        ${createDirectionSection(
                            'From Tahlequah to Pt. Defiance',
                            routes.tahlequah_point_defiance.from_tahlequah.sailings
                        )}
                        ${createDirectionSection(
                            'From Pt. Defiance to Tahlequah',
                            routes.tahlequah_point_defiance.from_point_defiance.sailings
                        )}
                    </div>
                </div>
                ${createBoatStatusHtml(routes.vashon_fauntleroy.boat_analysis)}
            `;

            // Update content directly - no fade animation
            content.innerHTML = html;
            content.classList.remove('loading');
        }

        function showError(message) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="error">
                    <h2>⚠️ Error</h2>
                    <p>${message}</p>
                    <p style="margin-top: 10px; font-size: 0.9em;">Retrying in 60 seconds...</p>
                </div>
            `;
        }

        async function fetchFerryData() {
            try {
                const response = await fetch('/api/ferries');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                renderFerryData(data);
            } catch (error) {
                console.error('Error fetching ferry data:', error);
                showError(error.message);
            }
        }

        async function fetchWeatherData() {
            try {
                // Vashon Island coordinates
                const lat = 47.4432;
                const lon = -122.4598;
                
                // Open-Meteo API - includes is_day, weather code, and wind for header selection
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m,is_day&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America/Los_Angeles`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`Weather API error! status: ${response.status}`);
                }
                
                const data = await response.json();
                updateWeatherDisplay(data);
                updateHeaderForWeather(data); // Update header based on weather
            } catch (error) {
                console.error('Error fetching weather data:', error);
                // Show error in weather box
                document.getElementById('temperature').textContent = '--';
                document.getElementById('conditions').textContent = 'Error';
                document.getElementById('windSpeed').textContent = '--';
            }
        }

        function updateWeatherDisplay(data) {
            const current = data.current;
            
            // Temperature (already in Fahrenheit)
            const temp = Math.round(current.temperature_2m);
            document.getElementById('temperature').textContent = temp;
            
            // Weather conditions from WMO code
            const weatherCode = current.weather_code;
            const conditions = getWeatherDescription(weatherCode);
            document.getElementById('conditions').textContent = conditions;
            
            // Wind speed - convert from mph to knots (1 mph = 0.868976 knots)
            const windMph = current.wind_speed_10m;
            const windKnots = Math.round(windMph * 0.868976);
            document.getElementById('windSpeed').textContent = windKnots;
        }

        function getWeatherDescription(code) {
            // WMO Weather interpretation codes
            const weatherCodes = {
                0: 'Clear',
                1: 'Mostly Clear',
                2: 'Partly Cloudy',
                3: 'Overcast',
                45: 'Foggy',
                48: 'Foggy',
                51: 'Light Drizzle',
                53: 'Drizzle',
                55: 'Heavy Drizzle',
                56: 'Freezing Drizzle',
                57: 'Heavy Freezing Drizzle',
                61: 'Light Rain',
                63: 'Rain',
                65: 'Heavy Rain',
                66: 'Freezing Rain',
                67: 'Heavy Freezing Rain',
                71: 'Light Snow',
                73: 'Snow',
                75: 'Heavy Snow',
                77: 'Snow Grains',
                80: 'Light Showers',
                81: 'Showers',
                82: 'Heavy Showers',
                85: 'Light Snow Showers',
                86: 'Snow Showers',
                95: 'Thunderstorm',
                96: 'Thunderstorm w/ Hail',
                99: 'Heavy Thunderstorm'
            };
            
            return weatherCodes[code] || 'Unknown';
        }

        // Initial fetch
        fetchFerryData();
        fetchWeatherData();

        // Refresh ferry data every 60 seconds
        refreshInterval = setInterval(fetchFerryData, 60000);
        
        // Refresh weather data every 5 minutes (300000 ms)
        setInterval(fetchWeatherData, 300000);

        // Handle visibility change to stop/start updates when tab is hidden
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                clearInterval(refreshInterval);
            } else {
                fetchFerryData();
                refreshInterval = setInterval(fetchFerryData, 60000);
            }
        });
    </script>
