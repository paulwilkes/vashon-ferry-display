<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferry Header - Overcast Animated</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 1400px;
            width: 100%;
        }
        
        /* Boat bobbing animation */
        @keyframes bob {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
        }
        
        .ferry {
            animation: bob 3s ease-in-out infinite;
            transform-origin: center;
        }
        
        /* Very subtle overcast movement */
        @keyframes driftOvercast {
            0% { transform: translateX(0); opacity: 0.3; }
            50% { opacity: 0.25; }
            100% { transform: translateX(20px); opacity: 0.3; }
        }
        
        @keyframes driftOvercastSlow {
            0% { transform: translateX(0); opacity: 0.2; }
            50% { opacity: 0.15; }
            100% { transform: translateX(-15px); opacity: 0.2; }
        }
        
        .overcast-1 { animation: driftOvercast 60s linear infinite; }
        .overcast-2 { animation: driftOvercastSlow 70s linear infinite; }
        .overcast-3 { animation: driftOvercast 65s linear infinite; }
        .overcast-4 { animation: driftOvercastSlow 75s linear infinite; }
        .overcast-5 { animation: driftOvercast 68s linear infinite; }
        
        /* Gentle wave movement */
        @keyframes wave {
            0%, 100% { d: path("M 0 310 Q 100 300, 200 310 T 400 310 T 600 310 T 800 310 T 1000 310 T 1200 310"); }
            50% { d: path("M 0 310 Q 100 305, 200 310 T 400 310 T 600 310 T 800 310 T 1000 310 T 1200 310"); }
        }
        
        @keyframes wave2 {
            0%, 100% { d: path("M 0 340 Q 120 330, 240 340 T 480 340 T 720 340 T 960 340 T 1200 340"); }
            50% { d: path("M 0 340 Q 120 335, 240 340 T 480 340 T 720 340 T 960 340 T 1200 340"); }
        }
        
        .wave-1 { animation: wave 4s ease-in-out infinite; }
        .wave-2 { animation: wave2 5s ease-in-out infinite; }
        
        /* Smoke drifting */
        @keyframes drift {
            0% { opacity: 0.7; transform: translate(0, 0); }
            100% { opacity: 0; transform: translate(20px, -30px); }
        }
        
        .smoke-1 { animation: drift 4s ease-out infinite; }
        .smoke-2 { animation: drift 4s ease-out 0.8s infinite; }
        .smoke-3 { animation: drift 4s ease-out 1.6s infinite; }
        .smoke-4 { animation: drift 4s ease-out 2.4s infinite; }
        .smoke-5 { animation: drift 4s ease-out 3.2s infinite; }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
            <!-- Background - uniform gray overcast sky -->
            <rect width="1200" height="400" fill="#B5B5B5" rx="20"/>
            
            <!-- Subtle variations in the overcast - very light patches with gentle movement -->
            <ellipse class="overcast-1" cx="300" cy="120" rx="250" ry="100" fill="#C0C0C0" opacity="0.3"/>
            <ellipse class="overcast-2" cx="700" cy="150" rx="280" ry="110" fill="#C0C0C0" opacity="0.25"/>
            <ellipse class="overcast-3" cx="1000" cy="100" rx="220" ry="90" fill="#C0C0C0" opacity="0.3"/>
            <ellipse class="overcast-4" cx="150" cy="180" rx="200" ry="80" fill="#ABABAB" opacity="0.2"/>
            <ellipse class="overcast-5" cx="900" cy="200" rx="240" ry="95" fill="#ABABAB" opacity="0.2"/>
            
            <!-- Water - darker gray-blue -->
            <path d="M 0 280 Q 150 270, 300 280 T 600 280 T 900 280 T 1200 280 L 1200 400 L 0 400 Z" fill="#5A6B7A"/>
            <path class="wave-1" d="M 0 310 Q 100 300, 200 310 T 400 310 T 600 310 T 800 310 T 1000 310 T 1200 310" fill="none" stroke="#4A5A68" stroke-width="3" opacity="0.5"/>
            <path class="wave-2" d="M 0 340 Q 120 330, 240 340 T 480 340 T 720 340 T 960 340 T 1200 340" fill="none" stroke="#4A5A68" stroke-width="3" opacity="0.5"/>
            
            <!-- Ferry group with bobbing animation -->
            <g class="ferry">
                <path d="M 470 260 L 455 305 L 825 305 L 815 260 Z" fill="#FFFFFF"/>
                <rect x="485" y="205" width="310" height="55" fill="#4B6EDB" rx="4"/>
                <rect x="515" y="155" width="250" height="50" fill="#FFFFFF" rx="4"/>
                <rect x="595" y="110" width="90" height="45" fill="#FF6B6B" rx="4"/>
                <rect x="605" y="125" width="18" height="22" fill="#FFE66D" rx="2"/>
                <rect x="632" y="125" width="18" height="22" fill="#FFE66D" rx="2"/>
                <rect x="659" y="125" width="18" height="22" fill="#FFE66D" rx="2"/>
                <rect x="635" y="95" width="8" height="15" fill="#4B6EDB"/>
                <circle cx="639" cy="90" r="6" fill="#FFE66D"/>
                <line x1="639" y1="84" x2="639" y2="75" stroke="#FF6B6B" stroke-width="2"/>
                <circle cx="639" cy="75" r="4" fill="#FFE66D"/>
                <rect x="530" y="170" width="22" height="25" fill="#4B6EDB" rx="2"/>
                <rect x="565" y="170" width="22" height="25" fill="#4B6EDB" rx="2"/>
                <rect x="600" y="170" width="22" height="25" fill="#4B6EDB" rx="2"/>
                <rect x="635" y="170" width="22" height="25" fill="#4B6EDB" rx="2"/>
                <rect x="670" y="170" width="22" height="25" fill="#4B6EDB" rx="2"/>
                <rect x="705" y="170" width="22" height="25" fill="#4B6EDB" rx="2"/>
                <rect x="505" y="220" width="45" height="30" fill="#FFE66D" rx="2"/>
                <rect x="570" y="220" width="45" height="30" fill="#FFE66D" rx="2"/>
                <rect x="635" y="220" width="45" height="30" fill="#FFE66D" rx="2"/>
                <rect x="700" y="220" width="45" height="30" fill="#FFE66D" rx="2"/>
                <ellipse cx="527" cy="235" rx="10" ry="7" fill="#FF6B6B"/>
                <ellipse cx="592" cy="235" rx="10" ry="7" fill="#FFFFFF"/>
                <ellipse cx="657" cy="235" rx="10" ry="7" fill="#FFE66D"/>
                <rect x="705" y="135" width="32" height="20" fill="#FF6B6B" rx="3"/>
                <ellipse cx="721" cy="135" rx="16" ry="5" fill="#FF6B6B"/>
                
                <g transform="translate(545, 180)">
                    <circle cx="0" cy="0" r="7" fill="#FF6B6B"/>
                    <ellipse cx="0" cy="11" rx="6" ry="9" fill="#4B6EDB"/>
                </g>
                <g transform="translate(620, 180)">
                    <circle cx="0" cy="0" r="7" fill="#FFE66D"/>
                    <ellipse cx="0" cy="11" rx="6" ry="9" fill="#FF6B6B"/>
                </g>
                <g transform="translate(690, 180)">
                    <circle cx="0" cy="0" r="7" fill="#4B6EDB"/>
                    <ellipse cx="0" cy="11" rx="6" ry="9" fill="#FFE66D"/>
                </g>
            </g>
            
            <!-- Smoke puffs - gray tones blending with overcast -->
            <circle class="smoke-1" cx="718" cy="117" r="11" fill="#9A9A9A" opacity="0.7"/>
            <circle class="smoke-2" cx="728" cy="108" r="13" fill="#9A9A9A" opacity="0.6"/>
            <circle class="smoke-3" cx="713" cy="103" r="9" fill="#9A9A9A" opacity="0.7"/>
            <circle class="smoke-4" cx="723" cy="93" r="11" fill="#9A9A9A" opacity="0.6"/>
            <circle class="smoke-5" cx="710" cy="88" r="8" fill="#9A9A9A" opacity="0.5"/>
            
            <!-- Birds barely visible against gray sky -->
            <path d="M 180 80 Q 190 75, 200 80" fill="none" stroke="#7A7A7A" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
            <path d="M 200 80 Q 210 75, 220 80" fill="none" stroke="#7A7A7A" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
            
            <path d="M 890 100 Q 900 95, 910 100" fill="none" stroke="#7A7A7A" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
            <path d="M 910 100 Q 920 95, 930 100" fill="none" stroke="#7A7A7A" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
            
            <path d="M 1020 70 Q 1030 65, 1040 70" fill="none" stroke="#7A7A7A" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
            <path d="M 1040 70 Q 1050 65, 1060 70" fill="none" stroke="#7A7A7A" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
            
            <!-- Decorative waves - muted -->
            <ellipse cx="200" cy="320" rx="40" ry="14" fill="#FFFFFF" opacity="0.3"/>
            <ellipse cx="460" cy="325" rx="38" ry="13" fill="#FFFFFF" opacity="0.3"/>
            <ellipse cx="820" cy="335" rx="45" ry="16" fill="#FFFFFF" opacity="0.3"/>
            <ellipse cx="1000" cy="315" rx="42" ry="15" fill="#FFFFFF" opacity="0.25"/>
            <ellipse cx="630" cy="350" rx="35" ry="12" fill="#FFFFFF" opacity="0.25"/>
            
            <circle cx="205" cy="310" r="7" fill="#FFFFFF" opacity="0.4"/>
            <circle cx="190" cy="315" r="5" fill="#FFFFFF" opacity="0.4"/>
            <circle cx="815" cy="325" r="7" fill="#FFFFFF" opacity="0.4"/>
            <circle cx="830" cy="330" r="5" fill="#FFFFFF" opacity="0.4"/>
        </svg>
    </div>
</body>
</html>
